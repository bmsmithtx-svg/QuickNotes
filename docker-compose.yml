services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: quicknotes-postgres
    environment:
      POSTGRES_DB: quicknotes
      POSTGRES_USER: quicknotes
      POSTGRES_PASSWORD: quicknotes
    ports:
      - "54322:5432"
    volumes:
      - quicknotes-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quicknotes -d quicknotes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quicknotes-postgres-data:
